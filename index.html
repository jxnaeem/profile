<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ঈদ সেলামী গ্রহণ করুন</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Kalpurush&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Hind Siliguri', 'Kalpurush', sans-serif;
      background: linear-gradient(135deg, #e91e63 0%, #8e44ad 100%);
      min-height: 100vh;
      color: #fff;
      padding: 15px;
    }
    .container {
      max-width: 420px;
      margin: 30px auto;
      background: rgba(255, 255, 255, 0.94);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      color: #333;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.9s ease-out forwards;
    }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    .header {
      background: #e91e63;
      color: white;
      padding: 28px 20px 22px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
      animation: shine 8s infinite linear;
    }
    @keyframes shine {
      0%   { transform: translateX(-100%) translateY(-100%) rotate(0deg); }
      100% { transform: translateX(100%)  translateY(100%)  rotate(360deg); }
    }
    .header h1 {
      font-size: 2.1rem;
      margin-bottom: 8px;
      font-weight: 700;
      animation: pulseText 3s infinite ease-in-out;
    }
    @keyframes pulseText { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    .form-area { padding: 28px 22px; }
    .form-group {
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(15px);
      animation: fadeInUpField 0.7s ease-out forwards;
    }
    .form-group:nth-child(1) { animation-delay: 0.2s; }
    .form-group:nth-child(2) { animation-delay: 0.35s; }
    .form-group:nth-child(3) { animation-delay: 0.5s; }
    @keyframes fadeInUpField { to { opacity: 1; transform: translateY(0); } }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; font-size: 1.05rem; }
    input[type="text"], input[type="tel"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 1.05rem;
      transition: all 0.3s ease;
    }
    input:focus {
      outline: none;
      border-color: #e91e63;
      box-shadow: 0 0 0 4px rgba(233, 30, 99, 0.18);
      transform: scale(1.02);
    }
    .slider-container { display: flex; flex-direction: column; align-items: center; }
    #amount {
      width: 100%;
      -webkit-appearance: none;
      height: 10px;
      border-radius: 5px;
      background: #e0e0e0;
      outline: none;
      margin: 12px 0 8px;
    }
    #amount::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #e91e63;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(233, 30, 99, 0.4);
      transition: all 0.2s;
    }
    #amount::-webkit-slider-thumb:hover { transform: scale(1.15); background: #c2185b; }
    #amount::-moz-range-thumb {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #e91e63;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(233, 30, 99, 0.4);
      border: none;
    }
    #amountValue { font-size: 1.6rem; font-weight: 700; color: #e91e63; margin-top: 6px; }
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: #e91e63;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.25rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-submit:hover {
      background: #c2185b;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(233, 30, 99, 0.35);
    }
    .btn-submit:disabled {
      background: #aaa;
      cursor: not-allowed;
      transform: none;
    }
    .btn-submit.loading::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 20px; height: 20px;
      border: 3px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      transform: translate(-50%, -50%);
    }
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    .message {
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      font-size: 1.05rem;
      text-align: center;
      display: none;
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.4s ease;
    }
    .message.show { display: block; opacity: 1; transform: scale(1); }
    .success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
    .note {
      text-align: center;
      margin-top: 24px;
      font-size: 0.95rem;
      color: #e0e0e0;
      line-height: 1.5;
      opacity: 0;
      animation: fadeIn 1.2s ease-out 0.6s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    @media (max-width: 480px) {
      .header h1 { font-size: 1.9rem; }
      .form-area { padding: 24px 18px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>ঈদ মোবারক!</h1>
    <p>সেলামী গ্রহণ করুন 🎁</p>
  </div>

  <div class="form-area">
    <form id="salamiForm">
      <div class="form-group">
        <label for="name">আপনার নাম</label>
        <input type="text" id="name" name="name" placeholder="" required autocomplete="off">
      </div>

      <div class="form-group">
        <label for="bkash">বিকাশ নম্বর</label>
        <input type="tel" id="bkash" name="bkash" placeholder="01XXXXXXXXX" pattern="01[3-9][0-9]{8}" 
               title="সঠিক ১১ সংখ্যার বিকাশ নম্বর দিন" required autocomplete="off">
      </div>

      <div class="form-group slider-container">
        <label for="amount">সেলামীর পরিমাণ: <span id="amountValue">১০</span> টাকা</label>
        <input type="range" id="amount" name="amount" min="1" max="50" value="10" step="1">
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">সেলামী পাঠানোর জন্য রেজিস্টার করুন</button>
    </form>

    <div id="message" class="message"></div>
  </div>
</div>

<div class="note">
  ঈদের দিন সেলামী পাঠানো হবে ইনশাআল্লাহ<br>
  সঠিক নম্বর ও পরিমাণ দিবেন, ভুল হলে সেলামী পৌঁছাবে না
</div>

<script>
  const form = document.getElementById('salamiForm');
  const messageDiv = document.getElementById('message');
  const submitBtn = document.getElementById('submitBtn');
  const amountSlider = document.getElementById('amount');
  const amountValue = document.getElementById('amountValue');

  amountSlider.addEventListener('input', function() {
    amountValue.textContent = this.value;
  });

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const name   = document.getElementById('name').value.trim();
    const bkash  = document.getElementById('bkash').value.trim();
    const amount = amountSlider.value;

    if (name.length < 2) {
      showMessage("নামটা একটু বড় হওয়া উচিত 😅", "error");
      return;
    }

    if (!/01[3-9][0-9]{8}/.test(bkash)) {
      showMessage("সঠিক বিকাশ নম্বর দিন (১১ ডিজিট)", "error");
      return;
    }

    // লোডিং শুরু
    submitBtn.disabled = true;
    submitBtn.classList.add('loading');
    submitBtn.textContent = "সাবমিট হচ্ছে... অপেক্ষা করুন";
    messageDiv.classList.remove('show');
    messageDiv.className = "message";

    const formData = new FormData();
    formData.append('name', name);
    formData.append('bkash', bkash);
    formData.append('amount', amount);

    try {
      const response = await fetch('https://script.google.com/macros/s/AKfycbzxERX_VboOBCR_qI5jvrkJENHc_eBxpiVEfAVCBgkP1eBylwTyBFDB_uNo2Afmpdk2Ig/exec', {
        method: 'POST',
        body: formData
      });

      const result = await response.json();

      if (result.result === "success") {
        showMessage(`রেজিস্ট্রেশন সফল!<br>ধন্যবাদ ${name}! ${amount} টাকা সেলামী নিবন্ধিত হয়েছে।<br>বিকাশ: ${bkash} 🎉`, "success");
        form.reset();
        amountValue.textContent = "10";
        amountSlider.value = 10;
      } else {
        showMessage("সমস্যা হয়েছে: " + (result.message || "অজানা এরর"), "error");
      }
    } catch (err) {
      showMessage("নেটওয়ার্ক সমস্যা: " + err.message, "error");
      console.error(err);
    } finally {
      // লোডিং শেষ — বাটন ফিরিয়ে আনা
      submitBtn.disabled = false;
      submitBtn.classList.remove('loading');
      submitBtn.textContent = "সেলামী পাঠানোর জন্য রেজিস্টার করুন";
    }
  });

  function showMessage(text, type) {
    messageDiv.innerHTML = text;
    messageDiv.className = "message " + type;
    setTimeout(() => messageDiv.classList.add('show'), 50);
  }
</script>

</body>
</html>
